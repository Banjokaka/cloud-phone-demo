<!DOCTYPE html>
<html>
<head>
  <title>企业直播WEB SDK DEMO</title>
  <link rel="shortcut icon"
    href=//p1-live.byteimg.com/tos-cn-i-gjr78lqtd0/3f061494968a653d3409e0607259939e.png~tplv-gjr78lqtd0-image.image
    sizes="16x16">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet"
    href="https://mediaservice-fe.volccdn.com/obj/vcloud-fe/livesaas-client/mobile/css/index.2.1.45-beta.15.css">
    <style>
      .app {
        background-image: url(//p6-live.byteimg.com/tos-cn-i-gjr78lqtd0/faa3e534621e30f31b5fd87bcd31a11d.jpg~tplv-gjr78lqtd0-image.image);
        background-size: 100% auto;
        background-repeat: no-repeat;
        height: 100%;
        width: 100%;
      }
      .wrapper {
        width: 90vw;
        min-width: 972px;
        max-width: 1612px;
        margin: 0 auto;
        padding-top: 150px;
        padding-bottom: 80px;
      }    
      .menu-top {
        width: 100%;
        display: flex;
      }
      .player {
        width: calc(90vw - 332px);
        /*播放器视频比例建议为16:9*/
        height: calc((90vw - 332px) / 16 * 9 + 55px);
        min-width: 640px; /*播放器最小宽度建议为640px*/
        max-width: 1280px;
        min-height: 415px;
        max-height: 775px;
      }
      .menu {
        /*菜单最小宽度建议为320px*/
        width: 320px;
        margin-left: 12px;
      }
      .menu-bottom {
        width: 100%;
        margin-top: 12px;
        height: 350px;
      }
    </style>
</head>

<body style="
  font-size: 10px;
  margin: 0;
  background-color: #080B12;
  height: 100vh;
">
  <div class='app'>
    <div class="wrapper">
      <div class="menu-top">
        <div id="player" class="player"></div>
        <div id="menu" class="menu"></div>
      </div>
      <div id="menu2" class="menu-bottom"></div>
    </div>
  </div>
  <script src="https://mediaservice-fe.volccdn.com/obj/vcloud-fe/livesaas-client/mobile/js/index.2.1.45-beta.15.js"></script>
</body>
<script>
  var webSDK = new window.ByteLiveWebSDK({
    activityId: 1861801825454139,
    token: 'PPRTll',
    service: 'liveDemo',
    mode: 1,
    modules: [
      {
        // 接入方页面内的元素ID, 对应模块会嵌入到此元素内
        id: "player",
        mode: "player",
      },
      {
        id: "menu",
        mode: "menu",
        // 配置需要显示的菜单，如需全部显示则无需配置
        menu: ["comment", "imagetext", "cardlist"],
      },
      {
        id: "menu2",
        mode: "menu",
        menu: ["bandcontent"],
      },
    ],
    options: {
      rotateFullscreen: true,
      rotateFullscreenForAndroid: true,
      disableRotateFullscreen: true,
    }
  })
  webSDK.on('error', console.log);
</script>

</html>
