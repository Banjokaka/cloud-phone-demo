<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>企业直播WEB SDK DEMO</title>
  <link rel="shortcut icon"
    href=//p1-live.byteimg.com/tos-cn-i-gjr78lqtd0/3f061494968a653d3409e0607259939e.png~tplv-gjr78lqtd0-image.image
    sizes="16x16">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet"
    href="https://mediaservice-fe.volccdn.com/obj/vcloud-fe/livesaas-client/mobile/css/index.2.1.45.css">
    <style>
      .app {
        background-image: url(//p6-live.byteimg.com/tos-cn-i-gjr78lqtd0/faa3e534621e30f31b5fd87bcd31a11d.jpg~tplv-gjr78lqtd0-image.image);
        background-size: 100% auto;
        background-repeat: no-repeat;
        height: 100%;
        width: 100%;
      }
      .wrapper {
        width: 90vw;
        min-width: 972px;
        max-width: 1612px;
        margin: 0 auto;
        padding-top: 150px;
        padding-bottom: 80px;
      }    
      .menu-top {
        width: 100%;
        display: flex;
      }
      .player {
        width: calc(90vw - 332px);
        /*播放器视频比例建议为16:9*/
        height: calc((90vw - 332px) / 16 * 9 + 55px);
        min-width: 640px; /*播放器最小宽度建议为640px*/
        max-width: 1280px;
        min-height: 415px;
        max-height: 775px;
        transition: transform 0.3s ease;
      }
      .rotate-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: #ff69b4;
        color: white;
        border: none;
        border-radius: 20px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        z-index: 9999;
        transition: background-color 0.3s ease;
      }
      .rotate-btn:hover {
        background-color: #ff1493;
      }
      .menu {
        /*菜单最小宽度建议为320px*/
        width: 320px;
        margin-left: 12px;
      }
      .menu-bottom {
        width: 100%;
        margin-top: 12px;
        height: 350px;
      }
      .debug-panel {
        position: fixed;
        left: 20px;
        top: 20px;
        z-index: 9999;
        width: 320px;
        padding: 12px;
        background: rgba(8, 11, 18, 0.92);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
      }
      .debug-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .debug-panel h3 {
        margin: 0;
        font-size: 14px;
      }
      .debug-toggle {
        width: auto !important;
        margin: 0 !important;
        padding: 3px 8px !important;
        background: rgba(255, 255, 255, 0.12) !important;
      }
      .debug-body {
        margin-top: 8px;
      }
      .debug-panel.collapsed {
        width: auto;
        padding: 8px 10px;
      }
      .debug-panel.collapsed .debug-body {
        display: none;
      }
      .debug-panel label {
        display: block;
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.76);
      }
      .debug-panel input,
      .debug-panel select {
        width: 100%;
        margin-top: 3px;
        padding: 6px 8px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #111827;
        color: #fff;
        box-sizing: border-box;
      }
      .debug-panel button {
        margin-top: 10px;
        width: 100%;
        padding: 7px 10px;
        border: 0;
        border-radius: 4px;
        background: #ff69b4;
        color: #fff;
        cursor: pointer;
      }
      .debug-panel .hint {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.58);
        line-height: 1.4;
        word-break: break-all;
      }
      @media (max-width: 768px) {
        .wrapper {
          width: 100vw;
          min-width: 0;
          padding-top: 72px;
        }
        .menu-top {
          display: block;
        }
        .player {
          width: 100vw;
          min-width: 0;
          height: calc(100vw / 16 * 9 + 55px);
          min-height: 0;
        }
        .menu {
          width: 100vw;
          margin-left: 0;
        }
        .debug-panel {
          left: 12px;
          top: 12px;
          right: auto;
          max-width: calc(100vw - 24px);
        }
        .debug-panel:not(.collapsed) {
          width: calc(100vw - 24px);
          max-height: 72vh;
          overflow-y: auto;
        }
        .rotate-btn {
          top: 12px;
          right: 12px;
          padding: 8px 12px;
          font-size: 13px;
        }
      }
    </style>
</head>

<body style="
  font-size: 10px;
  margin: 0;
  background-color: #080B12;
  height: 100vh;
">
  <div class='app'>
    <button class="rotate-btn" onclick="rotatePlayer()">旋转播放器</button>
    <div class="debug-panel collapsed" id="debug-panel">
      <div class="debug-header">
        <h3>LiveSaaS 调试</h3>
        <button class="debug-toggle" onclick="toggleDebugPanel()" id="debug-toggle">展开</button>
      </div>
      <div class="debug-body">
        <label>activityId</label>
        <input id="cfg-activity-id" placeholder="必填">
        <label>token</label>
        <input id="cfg-token" placeholder="必填">
        <label>service</label>
        <input id="cfg-service" value="liveDemo">
        <label>mode</label>
        <select id="cfg-mode">
          <option value="mobile-portrait">mobile-portrait</option>
          <option value="mobile">mobile</option>
        </select>
        <label>rotateFullscreen</label>
        <select id="cfg-rotate-fullscreen">
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
        <button onclick="applyConfigToUrl()">应用配置</button>
        <div class="hint">也可以直接访问：?activityId=xxx&token=xxx&service=liveDemo&mode=mobile-portrait&rotateFullscreen=true</div>
      </div>
    </div>
    <div class="wrapper">
      <div class="menu-top">
        <div id="player" class="player"></div>
        <div id="content" class="menu"></div>
      </div>
    </div>
  </div>
  <script src="https://mediaservice-fe.volccdn.com/obj/vcloud-fe/livesaas-client/mobile/js/index.2.1.45-beta.15.js"></script>
</body>
<script>
  var query = new URLSearchParams(window.location.search);
  var activityId = query.get('activityId') || '';
  var token = query.get('token') || '';
  var activeService = query.get('service') || 'liveDemo';
  var playerMode = query.get('mode') || 'mobile-portrait';
  var rotateFullscreen = query.get('rotateFullscreen') !== 'false';

  document.getElementById('cfg-activity-id').value = activityId;
  document.getElementById('cfg-token').value = token;
  document.getElementById('cfg-service').value = activeService;
  document.getElementById('cfg-mode').value = playerMode;
  document.getElementById('cfg-rotate-fullscreen').value = String(rotateFullscreen);

  function toggleDebugPanel() {
    var panel = document.getElementById('debug-panel');
    var toggle = document.getElementById('debug-toggle');
    var collapsed = panel.classList.toggle('collapsed');
    toggle.textContent = collapsed ? '展开' : '收起';
  }

  function applyConfigToUrl() {
    var next = new URLSearchParams();
    next.set('activityId', document.getElementById('cfg-activity-id').value.trim());
    next.set('token', document.getElementById('cfg-token').value.trim());
    next.set('service', document.getElementById('cfg-service').value.trim() || 'liveDemo');
    next.set('mode', document.getElementById('cfg-mode').value);
    next.set('rotateFullscreen', document.getElementById('cfg-rotate-fullscreen').value);
    window.location.search = next.toString();
  }

  if (!activityId || !token) {
    console.warn('缺少 activityId 或 token，请通过 URL 参数或左侧调试面板填写');
  }
  
  var webSDK = null;
  var sdkConfig = {
    activityId: activityId,
    token: token,
    service: activeService,
    mode: 1,
    modules: [
      {
        id: "player", // 接入方页面内的元素ID, 视频模块会嵌入到此元素内
        mode: playerMode,
      }
    ],
    options: {
      rotateFullscreen: rotateFullscreen
    }
  };

  function getByteLiveWebSDKConstructor() {
    var exported = window.ByteLiveWebSDK;
    var candidates = [
      exported,
      exported && exported.default,
      exported && exported.ByteLiveWebSDK,
      window.default,
    ];
    return candidates.find(function (item) { return typeof item === 'function'; });
  }

  function bindSDKEvents(instance) {
    instance.on('error', console.log);
  
    instance.on('card.explainStatusChange', (status) => {
      console.log('商品卡片讲解状态变化事件触发-explainStatusChange:', status);
    });

    instance.on('card.configChange', (config) => {
      console.log('商品卡片配置变化事件触发-configChange:', config);
    });

    instance.on('card.Change', (change) => {
      console.log('商品卡片变化事件触发-changeChange:', change);
    });

    instance.on('player.status', (status) => {
      console.log('播放器状态变化-player.status:', status);
    });
  }

  function initWebSDK(retryCount) {
    var SDKConstructor = getByteLiveWebSDKConstructor();
    if (!SDKConstructor) {
      if (retryCount < 20) {
        window.setTimeout(function () { initWebSDK(retryCount + 1); }, 100);
        return;
      }
      console.error('未找到 ByteLiveWebSDK 构造函数，请检查 SDK 脚本是否正确加载', window.ByteLiveWebSDK);
      return;
    }
    webSDK = new SDKConstructor(sdkConfig);
    window.__liveSaaS = webSDK;
    bindSDKEvents(webSDK);
    console.log('LiveSaaS SDK 已初始化', sdkConfig);
  }

  initWebSDK(0);

  let currentRotation = 0;
  function rotatePlayer() {
    try {
      const player = document.getElementById('player');
      if (player) {
        currentRotation += 90;
        if (currentRotation >= 360) {
          currentRotation = 0;
        }
        player.style.transform = `rotate(${currentRotation}deg)`;
        console.log(`播放器已旋转 ${currentRotation}°`);
      } else {
        console.error('未找到播放器元素');
      }
    } catch (error) {
      console.error('旋转播放器失败:', error);
    }
  }
</script>

</html>
